<style>
/* ═══════════════ iOS 17 DESIGN SYSTEM ═══════════════ */
:root {
  --rouge:#7B1A1A;--rouge-m:#A52020;--rouge-l:#F2E6E6;
  --blanc:#8A6A10;--blanc-m:#C49A20;--blanc-l:#FBF4E0;
  --rose:#9A3050;--rose-m:#D05070;--rose-l:#FCE8EF;
  --champ:#7A5A08;--champ-m:#B88A18;--champ-l:#FAF0D0;
  --ink:#18100A;--ink2:#5A3E30;--ink3:#9A8070;--ink4:#C8B8A8;
  --paper:#F8F4EF;--paper2:#EEE6DA;--paper3:#E4D8C8;
  --white:#FFFFFF;--border:#DDD0C0;
  --shadow-s:0 1px 8px rgba(24,16,10,.07);
  --shadow-m:0 3px 18px rgba(24,16,10,.10);
  --shadow-l:0 8px 36px rgba(24,16,10,.14);
  --r:12px;--rs:8px;
  --sidebar:220px;--topbar:64px;--botbar:76px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;-webkit-user-select:none;-webkit-font-smoothing:antialiased;}
body{font-family:'Outfit',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5;}
button,select,input,textarea{font-family:'Outfit',sans-serif;-webkit-appearance:none;outline:none;}
@supports (-webkit-touch-callout: none){input,textarea,select{font-size:16px!important;}}
img{display:block;max-width:100%;height:auto;object-fit:cover;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

/* ═══════════════ LAYOUT ═══════════════ */
#app{display:flex;height:100dvh;overflow:hidden;flex-direction:row;}
#sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.1);backdrop-filter:blur(2px);z-index:90;}
#sidebar-backdrop.on{display:block;}

#sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:linear-gradient(180deg,#FDF8F2 0%,#F5EDE0 60%,#EEE0CC 100%);
  display:flex;flex-direction:column;
  padding:0;overflow:hidden;
  border-right:1px solid var(--border);
  transition:transform .3s cubic-bezier(0.4,0,0.2,1);
  z-index:100;
}
#sidebar-logo{padding:20px 18px 14px;display:flex;align-items:center;gap:10px;}
#sidebar-logo-icon{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#7B1A1A,#C23052);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;box-shadow:0 2px 8px rgba(123,26,26,.3);
}
#sidebar-logo-text{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:var(--ink);line-height:1.2;}
#sidebar-logo-sub{font-size:10px;color:var(--ink3);font-family:'Outfit',sans-serif;font-weight:400;}

#sidebar-caves{padding:6px 10px 8px;border-bottom:1px solid var(--border);max-height:none;overflow-y:visible;}
#sidebar-caves-label{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);padding:0 6px 4px;}
.sb-cave{padding:4px 10px;font-size:12px;color:var(--ink2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .18s;border-radius:8px;margin-bottom:1px;touch-action:manipulation;}
.sb-cave.on{background:rgba(123,26,26,.10);color:var(--rouge);font-weight:600;}
.sb-cave-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;}
.sb-cave.on .sb-cave-dot{background:var(--rouge);}

#sidebar-nav{flex:1;padding:10px 10px 0;overflow-y:auto;}
.sn{padding:9px 10px;font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .18s;border-radius:99px;margin-bottom:2px;position:relative;touch-action:manipulation;}
.sn span{font-size:16px;width:20px;text-align:center;}
.sn.on{background:linear-gradient(135deg,rgba(123,26,26,.12),rgba(194,48,82,.08));color:var(--rouge);font-weight:600;}
.sn.on::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;border-radius:0 3px 3px 0;background:var(--rouge);}

#sidebar-foot{padding:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.sb-user-card{background:var(--white);padding:8px 10px;border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.sb-user-initials{width:28px;height:28px;border-radius:50%;background:var(--paper3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:var(--rouge);}
.sb-user-info{flex:1;min-width:0;line-height:1.2;}
.sb-user-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-user-role{font-size:9px;color:var(--ink3);text-transform:uppercase;}
#auth-sync{font-size:9px;color:var(--ink3);padding-left:4px;}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:var(--paper);}

#topbar{
  height:calc(var(--topbar) + max(env(safe-area-inset-top, 0px), 14px));
  flex-shrink:0;background:rgba(248,2
